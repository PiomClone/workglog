name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - run: gofmt -w cmd/workglog/main.go internal/app/app.go && git diff --exit-code
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - run: go test ./...
      - run: go build -buildvcs=false ./...
